- name: Setup Android NDK
  id: setup-ndk
  if: ${{ contains(join(matrix.targets, ','), 'android') }}
  uses: nttld/setup-ndk@v1
  with:
    ndk-version: r27d

- name: Configure Android toolchains
  if: ${{ contains(join(matrix.targets, ','), 'android') }}
  shell: bash
  env:
    NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
  run: |
    TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"

    test -x "$TOOLCHAIN/aarch64-linux-android28-clang"
    test -x "$TOOLCHAIN/x86_64-linux-android28-clang"

    echo "PATH_TO_NDK=$NDK_PATH" >> "$GITHUB_ENV"
    echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android28-clang" >> "$GITHUB_ENV"
    echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$TOOLCHAIN/x86_64-linux-android28-clang" >> "$GITHUB_ENV"

    echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android28-clang" >> "$GITHUB_ENV"
    echo "CC_x86_64_linux_android=$TOOLCHAIN/x86_64-linux-android28-clang" >> "$GITHUB_ENV"
    echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"
    echo "AR_x86_64_linux_android=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"
